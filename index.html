<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 500px;
}

#text {
  font-size: 24px;
  opacity: 0;
  transition: opacity 1s;
  min-height: 140px;
  line-height: 1.6;
}

button {
  margin-top: 25px;
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}

#start {
  background: white;
  color: black;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 18px;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>

</head>

<body>

<div class="container">
  <h1 id="text"></h1>
  <button id="start">Tap ❤️</button>
</div>

<script>

let messages = [
"Hey… ❤️",
"I don’t know where to start…",
"This is not just a message…",
"It’s something I’ve been feeling for a long time 💭",
"At first… you were just a normal person…",
"Just another conversation…",
"But slowly… something changed…",
"You became the one I wait for everyday 🥺",
"Your messages started to matter more…",
"Even your small ‘hi’ makes my day 😌",
"And your silence… hurts 💔",
"You became my peace… my comfort ❤️",
"When I feel lost… it’s you I think about 💭",
"My heart chooses you… every time 💖",
"I tried ignoring this feeling…",
"But it was never nothing…",
"It was always you 🥺",
"I don’t want to lose you…",
"You are not replaceable 💎",
"So today… I just want to ask…",
"Will you stay with me…",
"Not just for now…",
"But forever? 💍❤️"
];

let index = 0;
let text = document.getElementById("text");
let startBtn = document.getElementById("start");

// typing + fade
function showMessage() {
  text.style.opacity = 0;
  setTimeout(() => {
    text.innerHTML = messages[index];
    text.style.opacity = 1;
  }, 300);
}

// start
startBtn.onclick = () => {
  startBtn.style.display = "none";
  showMessage();
};

// tap next (mobile friendly)
document.body.addEventListener("click", next);

function next() {
  if (startBtn.style.display !== "none") return;

  index++;
  if (index < messages.length) {
    showMessage();
  } else {
    showProposal();
  }
}

// hearts
function hearts() {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}
setInterval(hearts, 300);

// proposal
function showProposal() {
  document.body.innerHTML = `
    <div style="text-align:center;">
      <h1 style="line-height:1.6;">
        Will you stay with me…<br>
        Not just now…<br>
        But forever? 💍❤️
      </h1>
      <button id="yes" style="background:green;color:white;">YES 😍</button>
      <button id="no" style="background:red;color:white;position:absolute;">NO 😜</button>
    </div>
  `;

  let noBtn = document.getElementById("no");
  let yesBtn = document.getElementById("yes");

  // NO escape
  function moveNo() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }

  noBtn.addEvent
}
